apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

// ============================================================================
// React Native Configuration
// ============================================================================
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"
    autolinkLibrariesWithApp()
}

// ============================================================================
// Build Configuration
// ============================================================================
def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: true).toBoolean()
def enableShrinkResourcesInReleaseBuilds = (findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: true).toBoolean()
def enablePngCrunchInReleaseBuilds = (findProperty('android.enablePngCrunchInReleaseBuilds') ?: true).toBoolean()
def hermesEnabled = (findProperty('hermesEnabled') ?: true).toBoolean()

// Only use JSC if Hermes is explicitly disabled
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    compileSdk rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    ndkVersion rootProject.ext.ndkVersion

    namespace 'com.tellbill.app'

    // ========================================================================
    // Default Configuration
    // ========================================================================
    defaultConfig {
        applicationId 'com.tellbill.app'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Enable MultiDex for apps with >65k methods
        // Required when including many libraries
        multiDexEnabled true

        // BuildConfig field for release level
        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
    }

    // ========================================================================
    // Signing Configuration
    // ========================================================================
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            // Read signing credentials from gradle.properties for CI/CD compatibility
            def keystoreFile = findProperty('KEYSTORE_FILE')
            def keystorePassword = findProperty('KEYSTORE_PASSWORD')
            def keyAlias = findProperty('KEY_ALIAS')
            def keyPassword = findProperty('KEY_PASSWORD')

            if (keystoreFile && keystorePassword && keyAlias && keyPassword) {
                storeFile file(keystoreFile)
                storePassword keystorePassword
                keyAlias = keyAlias
                keyPassword = keyPassword
            } else {
                // Fallback to debug keystore if credentials not provided
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    // ========================================================================
    // Build Types
    // ========================================================================
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
        }

        release {
            signingConfig signingConfigs.release
            debuggable false

            // ================================================================
            // APK Size Optimization for Release
            // ================================================================
            // Enable R8/ProGuard code minification
            minifyEnabled enableMinifyInReleaseBuilds

            // Shrink unused resources from AAR libraries
            shrinkResources enableShrinkResourcesInReleaseBuilds

            // ProGuard configuration for code obfuscation and optimization
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"

            // Enable PNG compression/optimization
            crunchPngs enablePngCrunchInReleaseBuilds

            // Optimize method ordering for faster app startup
            android.bundle.density.enableSplit = true
        }
    }

    // ========================================================================
    // Product Flavors for ABI Splits
    // ========================================================================
    // Split APK by architecture to reduce APK size
    // Only package arm64 and armeabi-v7a (most common architectures)
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a'
            universalApk true // Generate fallback universal APK
        }
    }

    // ========================================================================
    // D8 Configuration (if Jetifier is disabled and old libs slip through)
    // ========================================================================
    // Configure D8/R8 compiler to handle duplicate classes gracefully
    // These are emergency fallbacks if all dependency exclusion fails
    
    packagingOptions {
        jniLibs {
            // Use legacy packaging for compatibility with some libraries
            useLegacyPackaging = (findProperty('expo.useLegacyPackaging') ?: false).toBoolean()
        }

        // CRITICAL: Handle duplicate classes from old vs new support libraries
        // If BOTH versions somehow reach DEX merge, take the first one found
        // This is a last-resort safety net when exclusions fail
        pickFirsts += [
            // INotificationSideChannel from both core (androidx) and support-compat
            // Class path: android/support/v4/app/INotificationSideChannel
            // Both androidx.core:1.16.0 and support-compat:28.0.0 have this
            'android/support/v4/**',  // Everything in v4.* package
            
            // Native libraries
            'lib/armeabi-v7a/libc++_shared.so',
            'lib/arm64-v8a/libc++_shared.so',
            'lib/x86/libc++_shared.so',
            'lib/x86_64/libc++_shared.so',
            
            // AndroidX metadata
            'META-INF/androidx.*',
            'META-INF/proguard/androidx-*.pro',
        ]
    }

    androidResources {
        // Ignore version control and hidden files in resources
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }

    // ========================================================================
    // Lint Options
    // ========================================================================
    lint {
        disable 'MissingDimensionActivityCreator'
        // Ignore missing dimension warning from Play Services
        missingDimensionStrategy 'store', 'play'
    }

    // ========================================================================
    // Gradle Configuration Cache
    // ========================================================================
    // Speed up incremental builds by caching configuration
    // Improves CI/CD build times significantly
    configurations.all {
        resolutionStrategy {
            // ================================================================
            // CRITICAL: Dependency Conflict Resolution
            // ================================================================
            // This is the primary fix for DEX duplicate class errors
            // Ensures NO old Android Support Library classes are included

            // Exclude entire old Android Support Library group
            // This prevents all com.android.support:* dependencies
            exclude group: 'com.android.support'

            // Explicitly exclude specific modules with group+module combo
            // to prevent slipping through as transitive dependencies
            exclude group: 'com.android.support', module: 'support-compat'
            exclude group: 'com.android.support', module: 'support-v4'
            exclude group: 'com.android.support', module: 'support-annotations'
            exclude group: 'com.android.support', module: 'support-fragment'
            exclude group: 'com.android.support', module: 'support-vector-drawable'
            exclude group: 'com.android.support', module: 'animated-vector-drawable'
            exclude group: 'com.android.support', module: 'support-design'
            exclude group: 'com.android.support', module: 'support-media-compat'
            exclude group: 'com.android.support', module: 'support-compat'

            // The problematic module causing duplicate DEX errors
            // Use group+module combination for maximum effect
            exclude group: 'com.android.support', module: 'versionedparcelable'  // Excludes com.android.support:versionedparcelable:28.0.0

            // ================================================================
            // Force AndroidX Versions
            // ================================================================
            // Ensure consistent AndroidX versions across all dependencies
            // Prevents version conflicts between transitive dependencies

            force 'androidx.appcompat:appcompat:1.6.1'
            force 'androidx.core:core:1.16.0'
            force 'androidx.core:core-runtime:1.16.0'
            force 'androidx.core:core-ktx:1.16.0'
            force 'androidx.versionedparcelable:versionedparcelable:1.1.1'
            force 'androidx.annotation:annotation:1.7.0'
            force 'androidx.fragment:fragment:1.6.2'
            force 'androidx.activity:activity:1.8.0'
            force 'androidx.lifecycle:lifecycle-runtime:2.7.0'

            // Force consistent Fresco versions
            // Prevents conflicts between different Fresco artifact versions
            force 'com.facebook.fresco:fresco:2.6.0'
            force 'com.facebook.fresco:animated-gif:2.6.0'
            force 'com.facebook.fresco:webpsupport:2.6.0'
            force 'com.facebook.fresco:animated-webp:2.6.0'

            // Substitute any remaining old support library references with AndroidX
            // Acts as a fallback if dependencies still request old support libs
            // CRITICAL: versionedparcelable must be substituted to prevent DEX duplicates
            substitute module('com.android.support:versionedparcelable') with module('androidx.versionedparcelable:versionedparcelable:1.1.1')
            substitute module('com.android.support:support-v4') with module('androidx.legacy:legacy-support-v4:1.0.0')
            substitute module('com.android.support:appcompat-v7') with module('androidx.appcompat:appcompat:1.6.1')
            substitute module('com.android.support:support-annotations') with module('androidx.annotation:annotation:1.7.0')
            substitute module('com.android.support:support-compat') with module('androidx.core:core:1.16.0')
            substitute module('com.android.support:support-fragment') with module('androidx.fragment:fragment:1.6.2')
        }
    }
}

// Apply configuration-specific dependency rules for release builds
configurations {
    // Ensure release builds completely exclude old support libraries at every level
    all {
        // Most aggressive: exclude entire com.android.support group from ALL configurations
        exclude group: 'com.android.support'
        
        // Explicit module-level exclusions as backup
        exclude module: 'support-compat'
        exclude module: 'support-v4'
        exclude module: 'versionedparcelable'
    }
    
    // Additional explicit configuration-level rules for release variants
    releaseRuntimeClasspath {
        exclude group: 'com.android.support'
        exclude module: 'support-compat'
        exclude module: 'support-v4'
        exclude module: 'versionedparcelable'
        exclude module: 'support-annotations'
        exclude module: 'support-fragment'
    }
    releaseCompileClasspath {
        exclude group: 'com.android.support'
        exclude module: 'support-compat'
        exclude module: 'support-v4'
        exclude module: 'versionedparcelable'
        exclude module: 'support-annotations'
        exclude module: 'support-fragment'
    }
}

// ============================================================================
// Project Dependencies
// ============================================================================
dependencies {
    // React Native (version managed by React Native Gradle Plugin)
    implementation("com.facebook.react:react-android")

    // ========================================================================
    // CRITICAL: Dependency Constraints to Enforce AndroidX
    // ========================================================================
    // Explicitly declare androidx versions first to ensure they're resolved
    // before any transitive dependencies pull in old support libraries
    
    // AndroidX libraries (explicitly declared as direct dependencies)
    // CRITICAL: Explicitly declare androidx.versionedparcelable to ensure it's resolved first
    // This prevents transitive dependencies from pulling in com.android.support:versionedparcelable:28.0.0
    implementation 'androidx.versionedparcelable:versionedparcelable:1.1.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.16.0'
    implementation 'androidx.multidex:multidex:2.0.1'

    // ========================================================================
    // Hermes JavaScript Engine (Optional but Recommended)
    // ========================================================================
    // Hermes is a lightweight JS engine optimized for React Native
    // Significantly faster app startup and smaller bundle size
    // Set hermesEnabled in gradle.properties to toggle
    if (hermesEnabled) {
        // Use Hermes for faster startup and smaller bundle
        implementation("com.facebook.react:hermes-android")
    } else {
        // Fallback to JavaScriptCore if Hermes disabled
        implementation jscFlavor
    }

    // ========================================================================
    // Expo Media Support (Fresco)
    // ========================================================================
    // Media library used by Expo for image/animation handling
    // Configuration controlled by expo.gif.enabled and expo.webp.enabled in gradle.properties

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "true") == "true"
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "true") == "true"
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "false") == "true"

    // Fresco is always needed for image handling
    // Use stable 2.6.0 version to avoid CI build issues with dynamic versions
    implementation 'com.facebook.fresco:fresco:2.6.0'

    // GIF animation support
    if (isGifEnabled) {
        implementation 'com.facebook.fresco:animated-gif:2.6.0'
    }

    // WebP image format support
    if (isWebpEnabled) {
        implementation 'com.facebook.fresco:webpsupport:2.6.0'

        // Animated WebP support (adds ~3.4MB to APK, disabled by default)
        if (isWebpAnimatedEnabled) {
            implementation 'com.facebook.fresco:animated-webp:2.6.0'
        }
    }
}

// ============================================================================
// Gradle Configuration
// ============================================================================
// Apply packagingOptions from gradle.properties
// Allows customization of which files to include/exclude from final APK
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",")
    for (i in 0..<options.size()) options[i] = options[i].trim()
    options -= ""

    if (options.length > 0) {
        println "ℹ️  android.packagingOptions.$prop += $options"
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}
