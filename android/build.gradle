// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Exclude old Android Support Library to prevent duplicate DEX classes
// Must be applied after plugins load
allprojects {
  configurations.all {
    resolutionStrategy {
      exclude group: 'com.android.support'
      exclude module: 'support-compat'
      exclude module: 'support-v4'
      exclude module: 'support-annotations'
      exclude module: 'animated-vector-drawable'
      exclude module: 'support-vector-drawable'
      
      force 'androidx.appcompat:appcompat:1.6.1'
      force 'androidx.core:core:1.16.0'
      force 'androidx.versionedparcelable:versionedparcelable:1.1.1'
      force 'androidx.core:core-runtime:1.16.0'
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
