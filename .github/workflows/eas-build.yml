name: Build Android with Expo EAS

# NOTE: Setup required before first run:
# 1. Create Expo account: https://expo.dev
# 2. Create EAS token: eas tokens:create (run locally)
# 3. Add GitHub Secret: Settings → Secrets and variables → Actions → New secret
#    Name: EAS_TOKEN
#    Value: (paste token from step 2)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Validate EAS Token
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: EAS_TOKEN secret not set in GitHub Actions!"
            echo "Setup: Settings → Secrets and variables → Actions → New secret"
            echo "Name: EAS_TOKEN"
            echo "Value: (token from 'eas tokens:create')"
            exit 1
          fi
          echo "✓ EAS_TOKEN is configured"
        env:
          TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Android App Bundle (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Development APK
        if: github.event_name == 'workflow_dispatch'
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Complete
        if: always()
        run: |
          echo "Build Status: ${{ job.status }}"
          echo ""
          echo "📦 Build Artifacts:"
          echo "  → Available in EAS Dashboard: https://expo.dev"
          echo "  → View logs and download: https://expo.dev/builds"
          echo ""
          echo "🚀 Production Release Steps:"
          echo "  1. Download AAB from EAS Dashboard"
          echo "  2. Upload to Google Play Console"
          echo "  3. Complete release form and publish"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Build failed!"
          echo ""
          echo "Troubleshooting:"
          echo "  1. Check EAS_TOKEN secret is set (Settings → Secrets)"
          echo "  2. Verify eas.json has correct configuration"
          echo "  3. Check build logs: https://expo.dev/builds"
          echo ""
          exit 1
