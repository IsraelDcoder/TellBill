name: Build Android with Expo EAS

# NOTE: Setup required before first run:
# OPTION 1 (Recommended): Personal Access Token
#   1. Go to: https://expo.dev/account/settings
#   2. Find "Personal Access Tokens" or "API Tokens" section
#   3. Create new token
#   4. Add to GitHub Secrets:
#      Settings → Secrets and variables → Actions → New secret
#      Name: EAS_TOKEN
#      Value: (paste your token)
#
# OPTION 2: GitHub Connection (if tokens are hard to find)
#   1. Visit EAS project settings → GitHub
#   2. Click "Link GitHub account"
#   3. EAS will handle auth via GitHub (no manual token needed)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Validate EAS Token
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: EAS_TOKEN secret not set in GitHub Actions!"
            echo ""
            echo "Setup:"
            echo "  1. Create token at: https://expo.dev/account/settings"
            echo "  2. Add GitHub Secret: Settings → Secrets and variables → Actions"
            echo "  3. Name: EAS_TOKEN"
            echo "  4. Value: (paste your token)"
            exit 1
          fi
          echo "✓ EAS_TOKEN is configured"
        env:
          TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Android App Bundle (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Development APK
        if: github.event_name == 'workflow_dispatch'
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Complete
        if: always()
        run: |
          echo "Build Status: ${{ job.status }}"
          echo ""
          echo "📦 Build Artifacts:"
          echo "  → Available in EAS Dashboard: https://expo.dev"
          echo "  → View logs and download: https://expo.dev/builds"
          echo ""
          echo "🚀 Production Release Steps:"
          echo "  1. Download AAB from EAS Dashboard"
          echo "  2. Upload to Google Play Console"
          echo "  3. Complete release form and publish"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Build failed!"
          echo ""
          echo "Troubleshooting:"
          echo "  1. Check EAS_TOKEN secret is set (Settings → Secrets)"
          echo "  2. Verify eas.json has correct configuration"
          echo "  3. Check build logs: https://expo.dev/builds"
          echo ""
          exit 1
