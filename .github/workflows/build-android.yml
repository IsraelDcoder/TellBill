name: Build Android APK and Bundle

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Prebuild native code
        run: npx expo prebuild --clean --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Fix manifest merger appComponentFactory conflict
        run: |
          sed -i 's/<application/<application android:appComponentFactory="androidx.core.app.CoreComponentFactory" tools:replace="android:appComponentFactory"/g' android/app/src/main/AndroidManifest.xml
      
      - name: Exclude old Android Support Library to fix duplicate DEX classes
        run: |
          cat >> android/app/build.gradle << 'EOF'
          
          configurations.all {
              resolutionStrategy {
                  exclude group: 'com.android.support'
              }
          }
          EOF
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease -x checkReleaseDuplicateClasses --no-daemon -PKEYSTORE_FILE=app/release.keystore -PKEYSTORE_PASSWORD=tellbill123 -PKEY_ALIAS=tellbill-release -PKEY_PASSWORD=tellbill123
      
      - name: Build App Bundle (for Google Play)
        run: |
          cd android
          ./gradlew bundleRelease -x checkReleaseDuplicateClasses --no-daemon -PKEYSTORE_FILE=app/release.keystore -PKEYSTORE_PASSWORD=tellbill123 -PKEY_ALIAS=tellbill-release -PKEY_PASSWORD=tellbill123
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
      
      - name: Upload Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
