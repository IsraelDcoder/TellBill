# ========================================
# NGINX CONFIGURATION FOR TELLBILL LANDING
# ========================================
# This configuration optimizes the landing page for production

server {
    listen 80;
    listen [::]:80;
    server_name tellbill.com www.tellbill.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tellbill.com www.tellbill.com;
    
    # SSL Certificate
    ssl_certificate /etc/letsencrypt/live/tellbill.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tellbill.com/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Root directory
    root /var/www/tellbill.com/landing;
    index index.html;
    
    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;
    gzip_vary on;
    
    # Cache Control
    location ~* \.(css|js)$ {
        expires 1w;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 4w;
        add_header Cache-Control "public, immutable";
    }
    
    # HTML - No cache for index.html
    location ~ ^/$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
    
    # Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Block access to hidden files
    location ~ /\. {
        return 404;
    }
    
    # Deny access to backup files
    location ~ \.(backup|bak|swp)$ {
        return 404;
    }
}
