upstream tellbill_backend {
    server backend:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name tellbill.app www.tellbill.app;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    server_name tellbill.app www.tellbill.app;

    # SSL Certificates (configure with proper certificates)
    ssl_certificate /etc/ssl/certs/tellbill.crt;
    ssl_certificate_key /etc/ssl/private/tellbill.key;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Default root for landing pages
    root /var/www/tellbill/landing;
    index index.html;

    # ============================================
    # LANDING PAGE ROUTES
    # ============================================
    
    # Home page
    location = / {
        try_files $uri/index.html $uri $uri/ /index.html;
        add_header Cache-Control "max-age=3600, public";
    }

    # Privacy Policy
    location = /privacy-policy {
        try_files $uri.html $uri $uri/ /privacy-policy.html;
        add_header Cache-Control "max-age=86400, public";
    }

    location = /privacy-policy.html {
        add_header Cache-Control "max-age=86400, public";
    }

    # Terms & Conditions
    location = /terms-conditions {
        try_files $uri.html $uri $uri/ /terms-conditions.html;
        add_header Cache-Control "max-age=86400, public";
    }

    location = /terms-conditions.html {
        add_header Cache-Control "max-age=86400, public";
    }

    # ============================================
    # API PROXY
    # ============================================

    location /api/ {
        proxy_pass http://tellbill_backend;
        proxy_http_version 1.1;
        
        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ============================================
    # STATIC ASSETS
    # ============================================

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # ERROR HANDLING
    # ============================================

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
